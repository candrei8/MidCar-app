[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The build script `scripts/build-merchant-feed.mjs` writes
# `public/feeds/merchant.xml` during `prebuild`, and Netlify serves it as a
# static asset at /feeds/merchant.xml. No function in the request path =
# no chance of hitting the 10 s timeout while scraping ~95 fichas.
